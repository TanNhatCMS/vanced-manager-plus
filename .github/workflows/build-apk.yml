name: Build APK
permissions: {}

on:
  workflow_dispatch:


jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "18"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      - name: Validate signing secrets
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ENTRY_ALIAS: ${{ secrets.KEYSTORE_ENTRY_ALIAS }}
          KEYSTORE_ENTRY_PASSWORD: ${{ secrets.KEYSTORE_ENTRY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_B64" || (echo "Missing KEYSTORE_B64" && exit 1)
          test -n "$KEYSTORE_PASSWORD" || (echo "Missing KEYSTORE_PASSWORD" && exit 1)
          test -n "$KEYSTORE_ENTRY_ALIAS" || (echo "Missing KEYSTORE_ENTRY_ALIAS" && exit 1)
          test -n "$KEYSTORE_ENTRY_PASSWORD" || (echo "Missing KEYSTORE_ENTRY_PASSWORD" && exit 1)

      - name: Prepare signing files
        shell: bash
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 --decode > app/release.keystore
          cat <<EOF > keystore.properties
          storeFile=release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_ENTRY_ALIAS }}
          keyPassword=${{ secrets.KEYSTORE_ENTRY_PASSWORD }}
          EOF

      - name: Build release APK
        run: ./gradlew --no-daemon clean :app:assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: vanced-manager-plus-release
          archive: false
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
